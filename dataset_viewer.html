<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slab Dataset Viewer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;height:100vh;display:flex;flex-direction:column}
#header{background:#161b22;padding:10px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #30363d;flex-wrap:wrap}
#header h1{font-size:17px;color:#58a6ff;white-space:nowrap}
#header select,#header button{padding:5px 10px;border-radius:5px;border:1px solid #30363d;background:#21262d;color:#c9d1d9;font-size:12px;cursor:pointer}
#header button:hover,#header select:hover{border-color:#58a6ff}
#header button.active{background:#1f6feb;border-color:#1f6feb;color:#fff}
#main{display:flex;flex:1;overflow:hidden}
#sidebar{width:270px;background:#161b22;padding:12px;overflow-y:auto;border-right:1px solid #30363d;font-size:12px;flex-shrink:0}
#sidebar h3{color:#58a6ff;margin-bottom:6px;font-size:13px}
.stat-r{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #21262d}
.stat-r .v{color:#7ee787;font-weight:bold}
#graph-list{margin-top:8px;max-height:calc(100vh - 280px);overflow-y:auto}
.graph-item{padding:5px 8px;cursor:pointer;border-radius:3px;margin:1px 0;font-size:11px;display:flex;justify-content:space-between}
.graph-item:hover{background:#21262d}
.graph-item.sel{background:#1f6feb}
#canvas-wrap{flex:1;position:relative;background:#000;overflow:hidden}
canvas{display:block}
#info{position:absolute;top:8px;left:12px;font-size:11px;color:#8b949e;background:rgba(0,0,0,0.75);padding:4px 8px;border-radius:4px}
#info2{position:absolute;bottom:8px;right:12px;font-size:10px;color:#484f58}
#hover-tip{position:absolute;background:rgba(0,0,0,0.92);padding:6px 10px;border-radius:5px;font-size:11px;pointer-events:none;display:none;color:#ddd;border:1px solid #444;line-height:1.6;z-index:99}
#legend-box{position:absolute;right:12px;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:6px}
#legend-bar{width:18px;height:220px;border-radius:9px;border:1px solid #555;overflow:hidden}
#legend-bar canvas{width:100%;height:100%}
#legend-labels{display:flex;flex-direction:column;justify-content:space-between;height:220px;font-size:10px;color:#999}
</style>
</head>
<body>
<div id="header">
  <h1>Slab Dataset Viewer</h1>
  <select id="graph-sel" onchange="loadGraph()"><option>-- 选择图 --</option></select>
  <span style="color:#484f58;font-size:11px">| View:</span>
  <button id="btn-mesh" class="active" onclick="setView('mesh')">网格拓扑</button>
  <button id="btn-sing" onclick="setView('sing')">奇异点概率</button>
  <button id="btn-psl1" onclick="setView('psl1')">M1-PSL边</button>
  <button id="btn-psl2" onclick="setView('psl2')">M2-PSL边</button>
  <button id="btn-stress" onclick="setView('stress')">应力方向</button>
  <button id="btn-m1" onclick="setView('m1')">m1力值</button>
  <button id="btn-m2" onclick="setView('m2')">m2力值</button>
  <span style="color:#484f58;font-size:10px">| 滚轮缩放 · 拖拽平移 · 悬停查看</span>
</div>
<div id="main">
  <div id="sidebar">
    <h3>图概览</h3>
    <div id="stats-box">选择图查看统计</div>
    <h3 style="margin-top:12px">图列表</h3>
    <div id="graph-list"></div>
  </div>
  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <div id="legend-box">
      <div id="legend-labels"><span>1.0</span><span>0.5</span><span>0.0</span></div>
      <div id="legend-bar"><canvas id="legend-canvas"></canvas></div>
    </div>
    <div id="info"></div>
    <div id="info2"></div>
    <div id="hover-tip"></div>
  </div>
</div>

<script>
// ==================== 状态 ====================
let GRAPHS = [], currentGraph = null, currentView = 'mesh';
let nodesData = null, edgesData = null;  // 全量数据
let nodeMap = {};   // node_id → [x, y]
let ox = 0, oy = 0, scale = 600;
let dragging = false, dsx = 0, dsy = 0;
let hoverEdges = [];

const cnv = document.getElementById('c');
const ctx = cnv.getContext('2d');

// ==================== 初始化 ====================
(async function init(){
  resizeCanvas();
  drawLoading('加载数据集...');

  const r = await fetch('/api/continuous/info');
  const info = await r.json();
  GRAPHS = info.cases || [];

  const sel = document.getElementById('graph-sel');
  GRAPHS.forEach((g, i) => {
    sel.innerHTML += `<option value="${i}">Graph ${i} | N:${g.n_nodes} E:${g.n_edges} | Sing:${g.sing_nonzero_pct.toFixed(1)}% M1:${g.m1_nonzero_pct.toFixed(1)}% M2:${g.m2_nonzero_pct.toFixed(1)}%</option>`;
  });

  renderGraphList();
  if(GRAPHS.length > 0){ sel.value = '0'; loadGraph(); }

  // 绘制色标条
  drawLegendBar();
})();

function renderGraphList(){
  const html = GRAPHS.map((g, i) => {
    const sel = currentGraph && currentGraph.idx === i ? ' sel' : '';
    return `<div class="graph-item${sel}" onclick="selectGraph(${i})">
      <span>Graph ${i}</span>
      <span style="color:#7ee787">M1:${g.m1_mean.toFixed(2)} M2:${g.m2_mean.toFixed(2)}</span></div>`;
  }).join('');
  document.getElementById('graph-list').innerHTML = html;
}

function selectGraph(i){
  document.getElementById('graph-sel').value = i;
  loadGraph();
}

async function loadGraph(){
  const idx = parseInt(document.getElementById('graph-sel').value);
  if(isNaN(idx)) return;
  drawLoading(`加载 Graph ${idx}...`);

  const r = await fetch(`/api/continuous/graph/${idx}`);
  const g = await r.json();

  currentGraph = g;
  nodesData = g.nodes;
  edgesData = g.edges;

  // nodeMap
  nodeMap = {};
  for(const n of nodesData) nodeMap[n.node_id] = [n.x, n.y];

  renderStats();
  renderGraphList();
  resetView();
  draw();
}

// ==================== 统计面板 ====================
function renderStats(){
  const N = nodesData.length, E = edgesData.length;
  const singProbs = nodesData.map(n=>n.sing_prob);
  const m1Probs = edgesData.map(e=>e.m1_prob||0);
  const m2Probs = edgesData.map(e=>e.m2_prob||0);

  const fmt = arr => {
    const mx = Math.max(...arr), mn = Math.min(...arr);
    const mean = arr.reduce((a,b)=>a+b,0)/arr.length;
    return {min:mn, max:mx, mean};
  };
  const ss = fmt(singProbs), pm1 = fmt(m1Probs), pm2 = fmt(m2Probs);
  const singNz = singProbs.filter(v=>v>0.01).length;
  const m1Nz = m1Probs.filter(v=>v>0.01).length;
  const m2Nz = m2Probs.filter(v=>v>0.01).length;

  document.getElementById('stats-box').innerHTML = `
    <div style="color:#58a6ff;font-weight:bold;margin:4px 0;font-size:13px">基本统计</div>
    <div class="stat-r"><span>节点 / 边</span><span class="v">${N.toLocaleString()} / ${E.toLocaleString()}</span></div>
    <div class="stat-r"><span>Sing max / mean</span><span class="v">${ss.max.toFixed(4)} / ${ss.mean.toFixed(4)}</span></div>
    <div class="stat-r"><span>Sing >0.01</span><span class="v">${singNz} (${(100*singNz/N).toFixed(1)}%)</span></div>
    <div class="stat-r"><span style="color:#ff6666">M1-PSL max/mean</span><span class="v">${pm1.max.toFixed(3)} / ${pm1.mean.toFixed(3)}</span></div>
    <div class="stat-r"><span style="color:#ff6666">M1-PSL >0.01</span><span class="v">${m1Nz} (${(100*m1Nz/E).toFixed(1)}%)</span></div>
    <div class="stat-r"><span style="color:#6699ff">M2-PSL max/mean</span><span class="v">${pm2.max.toFixed(3)} / ${pm2.mean.toFixed(3)}</span></div>
    <div class="stat-r"><span style="color:#6699ff">M2-PSL >0.01</span><span class="v">${m2Nz} (${(100*m2Nz/E).toFixed(1)}%)</span></div>
    <div style="color:#58a6ff;font-weight:bold;margin:10px 0 4px;font-size:13px">Sing概率分布</div>
    <canvas id="hist-sing" width="248" height="100" style="background:#0d1117;border-radius:4px;width:100%"></canvas>
    <div style="color:#ff6666;font-weight:bold;margin:8px 0 4px;font-size:12px">M1-PSL分布</div>
    <canvas id="hist-m1" width="248" height="100" style="background:#0d1117;border-radius:4px;width:100%"></canvas>
    <div style="color:#6699ff;font-weight:bold;margin:8px 0 4px;font-size:12px">M2-PSL分布</div>
    <canvas id="hist-m2" width="248" height="100" style="background:#0d1117;border-radius:4px;width:100%"></canvas>
  `;
  setTimeout(() => {
    drawHist('hist-sing', singProbs, '#ff8855');
    drawHist('hist-m1', m1Probs, '#ff4444');
    drawHist('hist-m2', m2Probs, '#4488ff');
  }, 50);
}

function drawHist(cid, vals, color){
  const c = document.getElementById(cid); if(!c) return;
  const cx = c.getContext('2d'), W=c.width, H=c.height;
  cx.clearRect(0,0,W,H);
  const bins=30, hist=new Array(bins).fill(0);
  for(const v of vals){ const idx=Math.min(bins-1,Math.floor(v*bins)); hist[idx]++; }
  const maxH=Math.max(...hist,1), barW=(W-10)/bins;
  for(let i=0;i<bins;i++){
    const bh=(hist[i]/maxH)*(H-20);
    cx.fillStyle=color;cx.globalAlpha=0.6;
    cx.fillRect(5+i*barW,H-bh-10,barW-1,bh);
  }
  cx.fillStyle='#888';cx.font='9px sans-serif';cx.globalAlpha=1;
  cx.fillText('0',2,H-2); cx.fillText('1',W-16,H-2);
}

// ==================== 色标条 ====================
function probToColor(v){
  const t=Math.max(0,Math.min(1,v));
  let r,g,b;
  if(t<0.2){ const s=t/0.2; r=Math.floor(10+50*s); g=Math.floor(20+120*s); b=Math.floor(100+100*s); }
  else if(t<0.4){ const s=(t-0.2)/0.2; r=Math.floor(60+100*s); g=Math.floor(140+80*s); b=Math.floor(200-80*s); }
  else if(t<0.6){ const s=(t-0.4)/0.2; r=Math.floor(160+70*s); g=Math.floor(220-20*s); b=Math.floor(120-90*s); }
  else if(t<0.8){ const s=(t-0.6)/0.2; r=Math.floor(230+25*s); g=Math.floor(200-140*s); b=Math.floor(30-20*s); }
  else{ const s=(t-0.8)/0.2; r=Math.floor(255); g=Math.floor(60-60*s); b=Math.floor(10-10*s); }
  return `rgb(${r},${g},${b})`;
}

function drawLegendBar(){
  const lc = document.getElementById('legend-canvas');
  lc.width=18; lc.height=220;
  const lctx = lc.getContext('2d');
  for(let i=0;i<220;i++){
    lctx.fillStyle=probToColor(i/220);
    lctx.fillRect(0,219-i,18,1);
  }
}

// ==================== 视图切换 ====================
function setView(v){
  currentView=v;
  document.querySelectorAll('#header button').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+v)?.classList.add('active');
  draw();
}

// ==================== 绘制主入口 ====================
function draw(){
  if(!nodesData||!edgesData) return;
  resizeCanvas();
  ctx.clearRect(0,0,cnv.width,cnv.height);
  hoverEdges=[];

  const ns=nodesData, es=edgesData;
  const xs=ns.map(n=>n.x), ys=ns.map(n=>n.y);

  switch(currentView){
    case 'mesh': drawMesh(xs,ys,es); break;
    case 'sing': drawNodeProb(xs,ys,ns,es,'sing_prob'); break;
    case 'psl1': drawEdgeProbSingle(xs,ys,ns,es,'m1_prob','#ff4444'); break;
    case 'psl2': drawEdgeProbSingle(xs,ys,ns,es,'m2_prob','#4488ff'); break;
    case 'stress': drawStress(xs,ys,ns,es); break;
    case 'm1': drawNodeVal(xs,ys,ns,es,'m1_abs'); break;
    case 'm2': drawNodeVal(xs,ys,ns,es,'m2_abs'); break;
  }

  document.getElementById('info').innerHTML =
    `<b>Graph ${currentGraph.idx}</b> | N:${currentGraph.n_nodes} E:${currentGraph.n_edges} | View:${currentView}`;
  document.getElementById('info2').textContent = `scale:${scale.toFixed(0)}`;

  // 色标条：概率视图显示，力值视图隐藏
  const showLegend = ['sing','psl1','psl2'].includes(currentView);
  document.getElementById('legend-box').style.display = showLegend?'flex':'none';
}

// ==================== 坐标 ====================
function toXY(x,y){ return [ox+x*scale, oy+(1-y)*scale]; }
function getNodeXY(nid){ return nodeMap[nid] || [0.5,0.5]; }
function storeEdge(sx,sy,ex,ey,e){ hoverEdges.push({sx,sy,ex,ey,data:e}); }

// ==================== 各视图绘制 ====================

// ---- 网格拓扑 ----
function drawMesh(xs,ys,es){
  // 边
  ctx.strokeStyle='rgba(60,65,75,0.18)';ctx.lineWidth=0.4;ctx.beginPath();
  for(const e of es){
    const [sx,sy]=toXY(...getNodeXY(e.start_id));
    const [ex,ey]=toXY(...getNodeXY(e.end_id));
    ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);
  }
  ctx.stroke();
  // 节点
  ctx.fillStyle='rgba(100,160,255,0.5)';
  for(let i=0;i<xs.length;i++){
    const[p,q]=toXY(xs[i],ys[i]);
    ctx.fillRect(p-0.6,q-0.6,1.2,1.2);
  }
}

// ---- 节点概率（奇异点） ----
function drawNodeProb(xs,ys,ns,es,field){
  // 灰底网格
  ctx.strokeStyle='rgba(40,45,50,0.08)';ctx.lineWidth=0.25;ctx.beginPath();
  for(const e of es){
    const [sx,sy]=toXY(...getNodeXY(e.start_id));
    const [ex,ey]=toXY(...getNodeXY(e.end_id));
    ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);
  }
  ctx.stroke();
  // 节点色块
  for(let i=0;i<xs.length;i++){
    const[p,q]=toXY(xs[i],ys[i]);
    const v=ns[i][field];
    ctx.fillStyle=probToColor(v);
    ctx.fillRect(p-1.5,q-1.5,3,3);
  }
}

// ---- 单通道 PSL 边概率 ----
function drawEdgeProbSingle(xs,ys,ns,es,field,baseColor){
  // 灰底网格
  ctx.strokeStyle='rgba(40,45,50,0.06)';ctx.lineWidth=0.2;ctx.beginPath();
  for(const e of es){
    const [sx,sy]=toXY(...getNodeXY(e.start_id));
    const [ex,ey]=toXY(...getNodeXY(e.end_id));
    ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);
  }
  ctx.stroke();
  // 概率边
  for(const e of es){
    const v=e[field]||0;
    if(v<0.005) continue;
    const [sx,sy]=toXY(...getNodeXY(e.start_id));
    const [ex,ey]=toXY(...getNodeXY(e.end_id));
    const t=Math.min(v,1);
    ctx.strokeStyle=probToColor(t);
    ctx.lineWidth=0.5+3.0*t;
    ctx.globalAlpha=0.4+0.6*t;
    ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);ctx.stroke();
    if(v>0.05) storeEdge(sx,sy,ex,ey,e);
  }
  ctx.globalAlpha=1;
}

// ---- 节点标量值（m1/m2力值） ----
function drawNodeVal(xs,ys,ns,es,field){
  // 灰底网格
  ctx.strokeStyle='rgba(40,45,50,0.08)';ctx.lineWidth=0.25;ctx.beginPath();
  for(const e of es){
    const [sx,sy]=toXY(...getNodeXY(e.start_id));
    const [ex,ey]=toXY(...getNodeXY(e.end_id));
    ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);
  }
  ctx.stroke();
  // 归一化到 [0,1] 再映射颜色
  const vals=ns.map(n=>n[field]||0);
  const mx=Math.max(...vals,0.001);
  for(let i=0;i<xs.length;i++){
    const[p,q]=toXY(xs[i],ys[i]);
    const v=Math.min(vals[i]/mx,1);
    ctx.fillStyle=probToColor(v);
    ctx.fillRect(p-1.3,q-1.3,2.6,2.6);
  }
}

// ---- 应力方向 ----
function drawStress(xs,ys,ns,es){
  // 灰底网格
  ctx.strokeStyle='rgba(40,45,50,0.08)';ctx.lineWidth=0.25;ctx.beginPath();
  for(const e of es){
    const [sx,sy]=toXY(...getNodeXY(e.start_id));
    const [ex,ey]=toXY(...getNodeXY(e.end_id));
    ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);
  }
  ctx.stroke();
  // 方向箭头
  const step=Math.max(1,Math.floor(xs.length/500));
  const len=scale*0.012;
  for(let i=0;i<xs.length;i+=step){
    const n=ns[i]; const [p,q]=toXY(xs[i],ys[i]);
    if(Math.abs(n.m1_vx)>1e-6||Math.abs(n.m1_vy)>1e-6){
      ctx.strokeStyle='#ff5555';ctx.lineWidth=1.1;ctx.beginPath();
      ctx.moveTo(p,q);ctx.lineTo(p+n.m1_vx*len,q-n.m1_vy*len);ctx.stroke();
    }
    if(Math.abs(n.m2_vx)>1e-6||Math.abs(n.m2_vy)>1e-6){
      ctx.strokeStyle='#5588ff';ctx.lineWidth=1.1;ctx.beginPath();
      ctx.moveTo(p,q);ctx.lineTo(p+n.m2_vx*len,q-n.m2_vy*len);ctx.stroke();
    }
  }
}

// ==================== Canvas ====================
function resizeCanvas(){
  const wrap=document.getElementById('canvas-wrap');
  cnv.width=wrap.clientWidth;cnv.height=wrap.clientHeight;
}
function resetView(){
  scale=Math.min(cnv.width,cnv.height)*0.82;
  ox=cnv.width/2-scale/2;oy=cnv.height/2-scale/2;
}
function drawLoading(msg){
  resizeCanvas();
  ctx.fillStyle='#58a6ff';ctx.font='18px sans-serif';ctx.textAlign='center';
  ctx.fillText(msg,cnv.width/2,cnv.height/2);
  ctx.textAlign='start';
}

// ==================== 交互 ====================
cnv.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY>0?0.9:1.1, mx=e.offsetX, my=e.offsetY;
  ox=mx-(mx-ox)*f;oy=my-(my-oy)*f;scale*=f;
  scale=Math.max(30,Math.min(8000,scale));
  draw();
},{passive:false});

cnv.addEventListener('mousedown',e=>{dragging=true;dsx=e.offsetX;dsy=e.offsetY;});

cnv.addEventListener('mousemove',e=>{
  if(dragging){ox+=e.offsetX-dsx;oy+=e.offsetY-dsy;dsx=e.offsetX;dsy=e.offsetY;draw();return;}

  const mx=e.offsetX, my=e.offsetY;
  let bestDist=12, bestEdge=null;
  for(const he of hoverEdges){
    const d=pointToSegDist(mx,my,he.sx,he.sy,he.ex,he.ey);
    if(d<bestDist){bestDist=d;bestEdge=he;}
  }
  const tt=document.getElementById('hover-tip');
  if(bestEdge){
    const e=bestEdge.data;
    tt.innerHTML=`<b>Edge</b> #${e.edge_id}<br>Nodes: ${e.start_id}→${e.end_id}<br><span style="color:#ff6666">M1-PSL: ${(e.m1_prob||0).toFixed(6)}</span><br><span style="color:#6699ff">M2-PSL: ${(e.m2_prob||0).toFixed(6)}</span>`;
    tt.style.display='block';tt.style.left=(mx+18)+'px';tt.style.top=(my-10)+'px';
  }else{tt.style.display='none';}
});

function pointToSegDist(px,py,x1,y1,x2,y2){
  const dx=x2-x1,dy=y2-y1,len2=dx*dx+dy*dy;
  if(len2<1e-9) return Math.hypot(px-x1,py-y1);
  let t=((px-x1)*dx+(py-y1)*dy)/len2;
  t=Math.max(0,Math.min(1,t));
  return Math.hypot(px-(x1+t*dx),py-(y1+t*dy));
}
cnv.addEventListener('mouseup',()=>dragging=false);
cnv.addEventListener('mouseleave',()=>{dragging=false;document.getElementById('hover-tip').style.display='none';});
window.addEventListener('resize',()=>{resizeCanvas();draw();});
</script>
</body>
</html>
